# api-find — porta 8083 (sem conflito com client 8080 / reserva 8081 / restaurante 8082)
server.port=8083

# H2 console: http://localhost:8083/h2-console (quando habilitada)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:testdbfind2
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=create-drop