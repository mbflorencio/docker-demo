version: '3.8'

services:

  api-client:
    build:
      context: ./api-client
    platform: linux/amd64
    ports:
      - "8080:8080"
    networks:
      - my_network

  postgres-client:
    image: postgres:latest
    platform: linux/amd64
    environment:
      POSTGRES_DB: clientDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    networks:
      - my_network

  # Porta 8083 — H2 em memória (ver application.properties)
  api-find:
    build:
      context: ./api-find
    platform: linux/amd64
    ports:
      - "8083:8083"
    networks:
      - my_network

  api-restaurante:
    build:
      context: ./api-restaurante
    platform: linux/amd64
    ports:
      - "8082:8082"
    networks:
      - my_network

  postgres-restaurante:
    image: postgres:latest
    platform: linux/amd64
    environment:
      POSTGRES_DB: restauranteDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    networks:
      - my_network

  api-reserva:
    build:
      context: ./api-reserva
    platform: linux/amd64
    ports:
      - "8081:8081"
    networks:
      - my_network

  postgres-reserva:
    image: postgres:latest
    platform: linux/amd64
    environment:
      POSTGRES_DB: reservaDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    networks:
      - my_network

networks:
  my_network:
